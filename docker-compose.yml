services:
  src-guard:
    image: ghcr.io/max-sum/src-guard:latest
    container_name: src-guard
    restart: unless-stopped
    ports:
      - "22368:8080"
    environment:
      SRC_GUARD_TOKEN: "change-me-to-a-long-random-token"
      SRC_GUARD_SRC_CONTAINER: "starrailcopilot-src-1"
      SRC_GUARD_GAME_PACKAGE: "com.miHoYo.hkrpg"
      SRC_GUARD_ADB_CONNECT: ""
      SRC_GUARD_DEFAULT_PLAY_MINUTES: "120"
      SRC_GUARD_MAX_PLAY_MINUTES: "720"
      SRC_GUARD_AUTO_RESUME: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
